# ─── Netlify configuration ─────────────────────────────────────────────────
# Deploys the Next.js 14 app directly from the repository root.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# Next.js runtime adapter — handles SSR, ISR, image optimisation, etc.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Headers ────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
